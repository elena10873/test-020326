<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Два пончика и чашка кофе — Кофейня</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Cormorant Garamond', 'serif'],
                    },
                    colors: {
                        coffee: {
                            dark: '#2C1B0E',
                            medium: '#4B3621',
                            light: '#A67B5B',
                        },
                        cream: {
                            DEFAULT: '#FDFCF0',
                            dark: '#F5F2ED',
                        }
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                    }
                }
            }
        }
    </script>
    
    <style type="text/css">
        html {
            scroll-behavior: smooth;
        }
        body {
            background-color: #FDFCF0;
            color: #2C1B0E;
        }
        .selection-coffee::selection {
            background-color: #A67B5B;
            color: #FDFCF0;
        }
    </style>
</head>
<body class="selection-coffee">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple Icon component for CDN usage
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Navbar = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'Главная', href: '#home' },
                { name: 'О нас', href: '#about' },
                { name: 'Меню', href: '#menu' },
                { name: 'Контакты', href: '#contact' },
            ];

            return (
                <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-[#F5F2ED]/90 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-6'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                        <a href="#home" className="flex items-center gap-2 group">
                            <div className="bg-[#4B3621] p-2 rounded-full group-hover:rotate-12 transition-transform flex items-center justify-center">
                                <Icon name="coffee" className="text-[#FDFCF0]" size={24} />
                            </div>
                            <span className="font-serif text-2xl font-bold tracking-tight text-[#2C1B0E]">Два Пончика</span>
                        </a>

                        <div className="hidden md:flex items-center gap-8">
                            {navLinks.map((link) => (
                                <a key={link.name} href={link.href} className="text-[#4B3621] hover:text-[#2C1B0E] font-medium transition-colors relative group">
                                    {link.name}
                                    <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-[#A67B5B] transition-all group-hover:w-full"></span>
                                </a>
                            ))}
                            <button className="bg-[#4B3621] text-[#FDFCF0] px-6 py-2 rounded-full hover:bg-[#2C1B0E] transition-all shadow-sm hover:shadow-md">
                                Заказать
                            </button>
                        </div>

                        <button className="md:hidden text-[#2C1B0E]" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                            <Icon name={isMobileMenuOpen ? "x" : "menu"} size={28} />
                        </button>
                    </div>

                    {isMobileMenuOpen && (
                        <div className="md:hidden bg-[#F5F2ED] border-t border-[#A67B5B]/10 overflow-hidden">
                            <div className="flex flex-col p-6 gap-4">
                                {navLinks.map((link) => (
                                    <a key={link.name} href={link.href} onClick={() => setIsMobileMenuOpen(false)} className="text-lg font-medium text-[#4B3621] hover:text-[#2C1B0E]">
                                        {link.name}
                                    </a>
                                ))}
                                <button className="bg-[#4B3621] text-[#FDFCF0] px-6 py-3 rounded-xl mt-2">
                                    Заказать сейчас
                                </button>
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = () => (
            <section id="home" className="relative min-h-screen flex items-center pt-20 overflow-hidden bg-[#FDFCF0]">
                <div className="absolute top-20 -right-20 w-96 h-96 bg-[#A67B5B]/10 rounded-full blur-3xl"></div>
                <div className="absolute -bottom-20 -left-20 w-96 h-96 bg-[#4B3621]/5 rounded-full blur-3xl"></div>

                <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-12 items-center z-10">
                    <div>
                        <span className="inline-block py-1 px-4 rounded-full bg-[#A67B5B]/10 text-[#4B3621] font-semibold text-sm mb-6 uppercase tracking-widest">
                            Лучшее начало дня
                        </span>
                        <h1 className="font-serif text-6xl md:text-8xl font-bold text-[#2C1B0E] leading-[0.9] mb-8">
                            Два пончика и <span className="italic text-[#A67B5B]">чашка кофе</span>
                        </h1>
                        <p className="text-lg text-[#4B3621]/80 max-w-lg mb-10 leading-relaxed">
                            Мы верим, что идеальное утро начинается с аромата свежеобжаренных зерен и нежной глазури наших фирменных пончиков. Заходите за своей порцией вдохновения.
                        </p>
                        <div className="flex flex-wrap gap-4">
                            <button className="bg-[#4B3621] text-[#FDFCF0] px-8 py-4 rounded-full text-lg font-semibold hover:bg-[#2C1B0E] transition-all shadow-lg hover:-translate-y-1 flex items-center gap-2">
                                Смотреть меню <Icon name="chevron-right" size={20} />
                            </button>
                            <button className="border-2 border-[#4B3621] text-[#4B3621] px-8 py-4 rounded-full text-lg font-semibold hover:bg-[#4B3621] hover:text-[#FDFCF0] transition-all">
                                Найти нас
                            </button>
                        </div>
                    </div>

                    <div className="relative">
                        <div className="relative z-10 rounded-3xl overflow-hidden shadow-2xl rotate-2 hover:rotate-0 transition-transform duration-500">
                            <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80&w=800" alt="Coffee" className="w-full h-[500px] object-cover" />
                        </div>
                        <div className="absolute -bottom-6 -left-6 bg-white p-6 rounded-2xl shadow-xl z-20 flex items-center gap-4 animate-bounce-slow">
                            <div className="bg-[#A67B5B]/20 p-3 rounded-full flex items-center justify-center">
                                <Icon name="utensils" className="text-[#4B3621]" />
                            </div>
                            <div>
                                <p className="font-bold text-[#2C1B0E]">Свежесть 100%</p>
                                <p className="text-sm text-[#4B3621]/60">Печем каждое утро</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const About = () => (
            <section id="about" className="py-24 bg-[#F5F2ED]">
                <div className="max-w-7xl mx-auto px-6">
                    <div className="grid md:grid-cols-2 gap-16 items-center">
                        <div className="order-2 md:order-1 grid grid-cols-2 gap-4">
                            <img src="https://images.unsplash.com/photo-1559925393-8be0ec4767c8?auto=format&fit=crop&q=80&w=400" alt="Interior" className="rounded-2xl shadow-lg mt-8" />
                            <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&q=80&w=400" alt="Barista" className="rounded-2xl shadow-lg" />
                        </div>
                        <div className="order-1 md:order-2">
                            <h2 className="font-serif text-5xl font-bold text-[#2C1B0E] mb-8">Наша История</h2>
                            <div className="space-y-6 text-[#4B3621]/80 text-lg leading-relaxed">
                                <p>Все началось с простой идеи: создать место, где время замедляется. Название «Два пончика и чашка кофе» — это не просто вывеска, это наш золотой стандарт идеального перерыва.</p>
                                <p>Мы начали как маленькая семейная пекарня в 2018 году. Сегодня мы — это сообщество любителей качественного кофе и тех, кто ценит ручную работу.</p>
                                <div className="pt-4 flex gap-8">
                                    <div>
                                        <p className="text-3xl font-bold text-[#2C1B0E]">5+</p>
                                        <p className="text-sm uppercase tracking-wider">Лет опыта</p>
                                    </div>
                                    <div>
                                        <p className="text-3xl font-bold text-[#2C1B0E]">20к+</p>
                                        <p className="text-sm uppercase tracking-wider">Довольных гостей</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const MenuPreview = () => {
            const drinks = [
                { name: "Фирменный Латте", price: "350 ₽", desc: "Нежная молочная пенка с нотками карамели.", img: "https://images.unsplash.com/photo-1536939459926-301728717817?auto=format&fit=crop&q=80&w=400" },
                { name: "Черничный Пончик", price: "180 ₽", desc: "Свежая черника и сливочный крем.", img: "https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&q=80&w=400" },
                { name: "Раф Лаванда", price: "380 ₽", desc: "Цветочный аромат и густые сливки.", img: "https://images.unsplash.com/photo-1572286258217-315822c04222?auto=format&fit=crop&q=80&w=400" },
                { name: "Шоко-Донат", price: "190 ₽", desc: "Тройной шоколад в тесте и глазури.", img: "https://images.unsplash.com/photo-1527515637462-cff94eecc1ac?auto=format&fit=crop&q=80&w=400" }
            ];
            return (
                <section id="menu" className="py-24 bg-[#FDFCF0]">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <h2 className="font-serif text-5xl font-bold text-[#2C1B0E] mb-4">Наши Фавориты</h2>
                            <p className="text-[#4B3621]/60 max-w-xl mx-auto">Попробуйте то, за чем наши гости возвращаются снова и снова.</p>
                        </div>
                        <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
                            {drinks.map((item, index) => (
                                <div key={index} className="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all border border-[#A67B5B]/5 group">
                                    <div className="h-48 overflow-hidden">
                                        <img src={item.img} alt={item.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                                    </div>
                                    <div className="p-6">
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="font-bold text-lg text-[#2C1B0E]">{item.name}</h3>
                                            <span className="text-[#A67B5B] font-bold">{item.price}</span>
                                        </div>
                                        <p className="text-sm text-[#4B3621]/70 leading-relaxed">{item.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Contact = () => (
            <section id="contact" className="py-24 bg-[#2C1B0E] text-[#FDFCF0]">
                <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16">
                    <div>
                        <h2 className="font-serif text-5xl font-bold mb-8">Ждем вас в гости</h2>
                        <div className="space-y-8">
                            <div className="flex items-start gap-4">
                                <div className="bg-[#FDFCF0]/10 p-3 rounded-xl flex items-center justify-center"><Icon name="map-pin" className="text-[#A67B5B]" /></div>
                                <div><p className="font-bold text-lg">Адрес</p><p className="text-[#FDFCF0]/60">ул. Кофейная, 12, Москва</p></div>
                            </div>
                            <div className="flex items-start gap-4">
                                <div className="bg-[#FDFCF0]/10 p-3 rounded-xl flex items-center justify-center"><Icon name="clock" className="text-[#A67B5B]" /></div>
                                <div><p className="font-bold text-lg">Часы работы</p><p className="text-[#FDFCF0]/60">Пн - Пт: 08:00 - 21:00</p></div>
                            </div>
                        </div>
                    </div>
                    <div className="bg-[#FDFCF0]/5 rounded-3xl p-8 border border-[#FDFCF0]/10">
                        <h3 className="text-2xl font-bold mb-6">Напишите нам</h3>
                        <div className="space-y-4">
                            <input type="text" className="w-full bg-[#4B3621]/20 border border-[#FDFCF0]/10 rounded-xl px-4 py-3 focus:outline-none" placeholder="Ваше имя" />
                            <input type="email" className="w-full bg-[#4B3621]/20 border border-[#FDFCF0]/10 rounded-xl px-4 py-3 focus:outline-none" placeholder="Email" />
                            <textarea rows="4" className="w-full bg-[#4B3621]/20 border border-[#FDFCF0]/10 rounded-xl px-4 py-3 focus:outline-none" placeholder="Сообщение"></textarea>
                            <button className="w-full bg-[#A67B5B] text-[#2C1B0E] font-bold py-4 rounded-xl hover:bg-[#FDFCF0] transition-colors">Отправить</button>
                        </div>
                    </div>
                </div>
            </section>
        );

        const App = () => (
            <div>
                <Navbar />
                <Hero />
                <About />
                <MenuPreview />
                <Contact />
                <footer className="py-8 bg-[#2C1B0E] border-t border-[#FDFCF0]/5 text-center text-[#FDFCF0]/40 text-sm">
                    <p>© 2024 Два пончика и чашка кофе. Все права защищены.</p>
                </footer>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
